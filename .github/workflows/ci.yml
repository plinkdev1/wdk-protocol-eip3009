name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Lint · Test · Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (standard)
        run: npm run lint

      - name: Test (brittle, Node)
        run: npm test

      - name: Build type declarations
        run: npm run build:types

      - name: Run example
        run: npm run example
